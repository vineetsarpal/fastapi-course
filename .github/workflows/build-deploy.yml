name: Build and Deploy FastAPI app

on:
    push:
      branches: [ main ]  

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        environment:
            name: Production
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: Deploy to Ubuntu server
              uses: appleboy/ssh-action@v1

            - name: Login to DockerHub
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and Push Docker image
              uses: docker/build-push-action@v4
              with:
                context: .
                push: true
                tags: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-course:latest
                cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/fastapi-course:buildcache
                cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/fastapi-course:buildcache,mode=max

            - name: Deploy to DigitalOcean
              uses: appleboy/ssh-action@master
              with:
                host: ${{ secrets.PROD_HOST }}
                username: ${{ secrets.PROD_USERNAME }}
                key: ${{ secrets.SSH_PRIVATE_KEY }}
                script: |
                    # Stop and remove existing container if it exists
                    docker stop fastapi-container || true
                    docker rm fastapi-container || true
                    
                    # Pull the latest image
                    docker pull ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-course:latest
                    
                    # Run the new container
                    docker run -d \
                        --name fastapi-container \
                        -p 8000:8000 \
                        --restart unless-stopped \
                        ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-course:latest