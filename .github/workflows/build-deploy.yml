name: Build and Deploy FastAPI app

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          platforms: linux/arm64,linux/amd64

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          platforms: linux/arm64,linux/amd64
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-course:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-course:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/fastapi-course:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/fastapi-course:buildcache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: Production
    steps:
      - name: Deploy to Ubuntu server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
         script: |
            mkdir -p ~/app
            
            # Transfer docker-compose.yml via SCP
            scp -o StrictHostKeyChecking=no docker-compose.yml ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:~/app/
            
            cd ~/app
            
            # Create .env file from secrets
            rm -f .env  # Remove old .env file if it exists
            echo "DATABASE_HOST=postgres" >> .env
            echo "DATABASE_PORT=5432" >> .env
            echo "DATABASE_NAME=${{ secrets.DATABASE_NAME }}" >> .env
            echo "DATABASE_USER=${{ secrets.DATABASE_USER }}" >> .env
            echo "DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}" >> .env
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
            echo "ALGORITHM=${{ secrets.ALGORITHM }}" >> .env
            echo "ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}" >> .env
            
            # Secure .env file permissions
            chmod 600 .env
            
            # Pull latest images and deploy with Docker Compose
            docker compose --env-file ~/app/.env -f docker-compose.yml pull
            docker compose --env-file ~/app/.env -f docker-compose.yml up -d --force-recreate